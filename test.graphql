query productVariant {
    productVariants(first: 10) {
        nodes {
            sku
            sellingPlanGroups(first: 5) {
                nodes {
                    id
                    name
                    sellingPlans(first: 5) {
                        nodes {
                            id
                            name
                        }
                    }
                }
            }
        }
    }
}
